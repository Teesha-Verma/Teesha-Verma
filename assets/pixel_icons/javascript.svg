<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .bg-tile {
        fill: #050816;
        fill-opacity: 0.85;
        stroke: #2ECC71;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      .icon-group {
        animation: float-icon 3s infinite ease-in-out;
      }
      svg:hover .bg-tile {
        fill: #0A122E;
        stroke: #57F287;
        filter: url(#glow);
      }
      @keyframes float-icon {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-2px); }
      }
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g class="icon-group">
    <!-- Card Glass Frame -->
    <rect class="bg-tile" x="1.5" y="1.5" width="45" height="45" rx="6" />
    
    <path d="M 16 16 h 16 v 1 h -16 Z M 16 17 h 16 v 1 h -16 Z M 16 18 h 2 v 1 h -2 Z M 30 18 h 2 v 1 h -2 Z M 16 19 h 2 v 1 h -2 Z M 30 19 h 2 v 1 h -2 Z M 16 20 h 2 v 1 h -2 Z M 25 20 h 3 v 1 h -3 Z M 30 20 h 2 v 1 h -2 Z M 16 21 h 2 v 1 h -2 Z M 26 21 h 2 v 1 h -2 Z M 30 21 h 2 v 1 h -2 Z M 16 22 h 2 v 1 h -2 Z M 26 22 h 2 v 1 h -2 Z M 30 22 h 2 v 1 h -2 Z M 16 23 h 2 v 1 h -2 Z M 26 23 h 2 v 1 h -2 Z M 30 23 h 2 v 1 h -2 Z M 16 24 h 2 v 1 h -2 Z M 19 24 h 2 v 1 h -2 Z M 26 24 h 2 v 1 h -2 Z M 30 24 h 2 v 1 h -2 Z M 16 25 h 2 v 1 h -2 Z M 19 25 h 2 v 1 h -2 Z M 26 25 h 2 v 1 h -2 Z M 30 25 h 2 v 1 h -2 Z M 16 26 h 2 v 1 h -2 Z M 19 26 h 2 v 1 h -2 Z M 25 26 h 3 v 1 h -3 Z M 30 26 h 2 v 1 h -2 Z M 16 27 h 2 v 1 h -2 Z M 20 27 h 6 v 1 h -6 Z M 30 27 h 2 v 1 h -2 Z M 16 28 h 2 v 1 h -2 Z M 30 28 h 2 v 1 h -2 Z M 16 29 h 2 v 1 h -2 Z M 30 29 h 2 v 1 h -2 Z M 16 30 h 16 v 1 h -16 Z M 16 31 h 16 v 1 h -16 Z" fill="#57F287" />

    <!-- Cyber corner ticks -->
    <rect x="3" y="3" width="1.5" height="1.5" fill="#57F287" opacity="0.4" />
    <rect x="43.5" y="43.5" width="1.5" height="1.5" fill="#57F287" opacity="0.4" />
  </g>
</svg>
