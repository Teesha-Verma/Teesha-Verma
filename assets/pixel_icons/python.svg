<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .bg-tile {
        fill: #050816;
        fill-opacity: 0.85;
        stroke: #2ECC71;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      .icon-group {
        animation: float-icon 3s infinite ease-in-out;
      }
      svg:hover .bg-tile {
        fill: #0A122E;
        stroke: #57F287;
        filter: url(#glow);
      }
      @keyframes float-icon {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-2px); }
      }
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g class="icon-group">
    <!-- Card Glass Frame -->
    <rect class="bg-tile" x="1.5" y="1.5" width="45" height="45" rx="6" />
    
    <path d="M 20 16 h 4 v 1 h -4 Z M 19 17 h 6 v 1 h -6 Z M 18 18 h 2 v 1 h -2 Z M 21 18 h 5 v 1 h -5 Z M 18 19 h 8 v 1 h -8 Z M 18 20 h 4 v 1 h -4 Z M 18 21 h 4 v 1 h -4 Z M 24 24 h 6 v 1 h -6 Z M 23 25 h 6 v 1 h -6 Z M 23 26 h 6 v 1 h -6 Z M 23 27 h 6 v 1 h -6 Z M 22 28 h 3 v 1 h -3 Z M 26 28 h 2 v 1 h -2 Z M 23 29 h 4 v 1 h -4 Z" fill="#57F287" />
    <path d="M 22 20 h 6 v 1 h -6 Z M 22 21 h 7 v 1 h -7 Z M 17 22 h 13 v 1 h -13 Z M 16 23 h 14 v 1 h -14 Z M 16 24 h 8 v 1 h -8 Z M 17 25 h 6 v 1 h -6 Z M 21 26 h 2 v 1 h -2 Z M 21 27 h 2 v 1 h -2 Z" fill="#00C896" />
    <path d="M 20 18 h 1 v 1 h -1 Z M 25 28 h 1 v 1 h -1 Z" fill="#FFFFFF" />

    <!-- Cyber corner ticks -->
    <rect x="3" y="3" width="1.5" height="1.5" fill="#57F287" opacity="0.4" />
    <rect x="43.5" y="43.5" width="1.5" height="1.5" fill="#57F287" opacity="0.4" />
  </g>
</svg>
