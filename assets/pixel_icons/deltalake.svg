<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .bg-tile {
        fill: #050816;
        fill-opacity: 0.85;
        stroke: #2ECC71;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      .icon-group {
        animation: float-icon 3s infinite ease-in-out;
      }
      svg:hover .bg-tile {
        fill: #0A122E;
        stroke: #57F287;
        filter: url(#glow);
      }
      @keyframes float-icon {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-2px); }
      }
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g class="icon-group">
    <!-- Card Glass Frame -->
    <rect class="bg-tile" x="1.5" y="1.5" width="45" height="45" rx="6" />
    
    <path d="M 22 16 h 2 v 1 h -2 Z M 21 17 h 1 v 1 h -1 Z M 23 17 h 2 v 1 h -2 Z M 20 18 h 1 v 1 h -1 Z M 22 18 h 1 v 1 h -1 Z M 24 18 h 1 v 1 h -1 Z M 19 19 h 1 v 1 h -1 Z M 21 19 h 3 v 1 h -3 Z M 25 19 h 1 v 1 h -1 Z M 18 20 h 1 v 1 h -1 Z M 20 20 h 1 v 1 h -1 Z M 24 20 h 1 v 1 h -1 Z M 26 20 h 1 v 1 h -1 Z M 17 21 h 1 v 1 h -1 Z M 19 21 h 1 v 1 h -1 Z M 25 21 h 1 v 1 h -1 Z M 27 21 h 1 v 1 h -1 Z M 16 22 h 1 v 1 h -1 Z M 18 22 h 9 v 1 h -9 Z M 28 22 h 1 v 1 h -1 Z M 16 23 h 1 v 1 h -1 Z M 29 23 h 1 v 1 h -1 Z M 17 24 h 1 v 1 h -1 Z M 28 24 h 1 v 1 h -1 Z M 18 25 h 2 v 1 h -2 Z M 26 25 h 2 v 1 h -2 Z M 20 26 h 6 v 1 h -6 Z M 17 27 h 12 v 1 h -12 Z M 16 28 h 1 v 1 h -1 Z M 29 28 h 1 v 1 h -1 Z M 16 29 h 1 v 1 h -1 Z M 29 29 h 1 v 1 h -1 Z M 16 30 h 1 v 1 h -1 Z M 29 30 h 1 v 1 h -1 Z M 17 31 h 12 v 1 h -12 Z" fill="#57F287" />
    <path d="M 18 24 h 10 v 1 h -10 Z M 20 25 h 6 v 1 h -6 Z M 17 29 h 12 v 1 h -12 Z M 17 30 h 12 v 1 h -12 Z" fill="#00C896" />
    <path d="M 22 17 h 1 v 1 h -1 Z M 21 18 h 1 v 1 h -1 Z M 23 18 h 1 v 1 h -1 Z M 20 19 h 1 v 1 h -1 Z M 24 19 h 1 v 1 h -1 Z M 19 20 h 1 v 1 h -1 Z M 25 20 h 1 v 1 h -1 Z M 18 21 h 1 v 1 h -1 Z M 26 21 h 1 v 1 h -1 Z M 17 22 h 1 v 1 h -1 Z M 27 22 h 1 v 1 h -1 Z M 17 23 h 12 v 1 h -12 Z M 17 28 h 12 v 1 h -12 Z" fill="#FFFFFF" />

    <!-- Cyber corner ticks -->
    <rect x="3" y="3" width="1.5" height="1.5" fill="#57F287" opacity="0.4" />
    <rect x="43.5" y="43.5" width="1.5" height="1.5" fill="#57F287" opacity="0.4" />
  </g>
</svg>
