<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 90" width="180" height="90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #6272A4;
        text-anchor: middle;
      }
      .tech-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #C5C9DB;
        text-anchor: middle;
      }
      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #1A253C;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      svg:hover .card-bg {
        stroke: #BD93F9;
        filter: url(#glow);
      }
    </style>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect class="card-bg" width="180" height="90" rx="6" />

  <!-- Title -->
  <text class="title" x="90" y="18">💻 Web</text>

  <!-- Angular -->
  <g transform="translate(18, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Angular Shield -->
    <g transform="translate(10, 6) scale(0.75)">
      <polygon points="10,0 20,3.5 17.5,15.5 10,20 2.5,15.5 0,3.5" fill="#DD0031" />
      <polygon points="10,0 10,20 17.5,15.5 20,3.5" fill="#C3002F" />
      <path d="M 10 3 L 4.5 15 h 2.8 l 1.1 -3 h 3.2 l 1.1 3 h 2.8 Z M 10 6.5 L 12.3 11 H 7.7 Z" fill="#FFFFFF" />
    </g>
    <text class="tech-label" x="18" y="47">Angular</text>
  </g>

  <!-- .NET -->
  <g transform="translate(72, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Purple .NET circle -->
    <g transform="translate(10, 6) scale(0.8)">
      <circle cx="10" cy="10" r="10" fill="#512BD4" />
      <text x="10" y="14" font-family="sans-serif" font-weight="bold" font-size="8" fill="#FFFFFF" text-anchor="middle">.NET</text>
    </g>
    <text class="tech-label" x="18" y="47">.NET</text>
  </g>

  <!-- JavaScript -->
  <g transform="translate(126, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Yellow JS box -->
    <g transform="translate(9, 6)">
      <rect width="18" height="18" fill="#F7DF1E" />
      <text x="14" y="16" font-family="sans-serif" font-weight="bold" font-size="9" fill="#000000">JS</text>
    </g>
    <text class="tech-label" x="18" y="47">JavaScript</text>
  </g>
</svg>