<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" width="1000" height="380">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Share+Tech+Mono&amp;family=Inter:wght@400;700&amp;display=swap');
      
      .terminal-text {
        font-family: 'Share Tech Mono', 'Consolas', 'Courier New', monospace;
        font-size: 14px;
        fill: #57F287;
      }
      
      .hero-title {
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 24px;
        fill: #FFFFFF;
        font-weight: bold;
      }
      
      .hero-subtitle {
        font-family: 'Share Tech Mono', 'Consolas', 'Courier New', monospace;
        font-size: 18px;
        fill: #00C896;
      }
      
      .code-font {
        font-family: 'Share Tech Mono', 'Consolas', 'Courier New', monospace;
        font-size: 16px;
      }
      
      .loading-bar {
        animation: load 4s infinite linear;
      }
      
      .star {
        animation: twinkle 3s infinite ease-in-out;
      }
      
      .cloud {
        animation: float 25s infinite linear;
      }
      
      .jumping-bunny {
        animation: jump-trajectory 5s infinite ease-in-out;
        transform-origin: 10px 24px;
      }
      
      .glow-rect {
        filter: url(#neon-glow);
      }
      
      /* CSS Keyframes */
      @keyframes load {
        0% { width: 0; }
        50% { width: 600px; }
        80% { width: 850px; }
        100% { width: 1000px; }
      }
      
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      
      @keyframes float {
        0% { transform: translateX(1100px); }
        100% { transform: translateX(-150px); }
      }
      
      @keyframes jump-trajectory {
        0%, 100% {
          transform: translate(630px, 206px) scale(2);
        }
        5% {
          transform: translate(630px, 212px) scale(2, 1.7); /* squash before jump */
        }
        15% {
          transform: translate(650px, 110px) scale(1.8, 2.2); /* stretch up */
        }
        30% {
          transform: translate(720px, 60px) scale(2); /* apex of jump */
        }
        45% {
          transform: translate(790px, 100px) scale(1.8, 2.2); /* descend */
        }
        50% {
          transform: translate(810px, 166px) scale(2, 1.7); /* land squash */
        }
        55%, 60% {
          transform: translate(810px, 166px) scale(2); /* standing idle */
        }
        65% {
          transform: translate(810px, 172px) scale(2, 1.7); /* squash to jump back */
        }
        75% {
          transform: translate(790px, 100px) scale(1.8, 2.2); /* stretch back */
        }
        85% {
          transform: translate(720px, 60px) scale(2); /* apex */
        }
        92% {
          transform: translate(650px, 130px) scale(1.8, 2.2); /* descend */
        }
        97% {
          transform: translate(630px, 206px) scale(2, 1.7); /* land squash */
        }
      }
    </style>

    <!-- Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Background Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2ECC71" stroke-width="1" opacity="0.04" />
      <circle cx="40" cy="0" r="1.5" fill="#2ECC71" opacity="0.15" />
    </pattern>

    <!-- Bunny Paths -->
    <g id="bunny-mascot">
      <!-- White Body -->
      <path d="M 2 2 h 3 v 1 h -3 Z M 13 2 h 3 v 1 h -3 Z M 2 3 h 1 v 1 h -1 Z M 4 3 h 1 v 1 h -1 Z M 13 3 h 1 v 1 h -1 Z M 15 3 h 1 v 1 h -1 Z M 2 4 h 1 v 1 h -1 Z M 4 4 h 1 v 1 h -1 Z M 13 4 h 1 v 1 h -1 Z M 15 4 h 1 v 1 h -1 Z M 2 5 h 1 v 1 h -1 Z M 4 5 h 1 v 1 h -1 Z M 13 5 h 1 v 1 h -1 Z M 15 5 h 1 v 1 h -1 Z M 2 6 h 1 v 1 h -1 Z M 4 6 h 1 v 1 h -1 Z M 13 6 h 1 v 1 h -1 Z M 15 6 h 1 v 1 h -1 Z M 3 7 h 2 v 1 h -2 Z M 7 7 h 4 v 1 h -4 Z M 13 7 h 2 v 1 h -2 Z M 3 8 h 12 v 1 h -12 Z M 2 9 h 14 v 1 h -14 Z M 1 10 h 16 v 1 h -16 Z M 1 11 h 2 v 1 h -2 Z M 4 11 h 8 v 1 h -8 Z M 13 11 h 4 v 1 h -4 Z M 1 12 h 16 v 1 h -16 Z M 1 13 h 1 v 1 h -1 Z M 4 13 h 4 v 1 h -4 Z M 9 13 h 4 v 1 h -4 Z M 15 13 h 2 v 1 h -2 Z M 1 14 h 1 v 1 h -1 Z M 4 14 h 3 v 1 h -3 Z M 8 14 h 1 v 1 h -1 Z M 10 14 h 3 v 1 h -3 Z M 15 14 h 2 v 1 h -2 Z M 2 15 h 14 v 1 h -14 Z M 4 16 h 10 v 1 h -10 Z M 2 17 h 14 v 1 h -14 Z M 1 18 h 16 v 1 h -16 Z M 1 19 h 16 v 1 h -16 Z M 1 20 h 16 v 1 h -16 Z M 2 21 h 14 v 1 h -14 Z M 3 22 h 2 v 1 h -2 Z M 7 22 h 4 v 1 h -4 Z M 13 22 h 2 v 1 h -2 Z" fill="#FFFFFF" />
      <!-- Pink Ears -->
      <path d="M 3 3 h 1 v 1 h -1 Z M 14 3 h 1 v 1 h -1 Z M 3 4 h 1 v 1 h -1 Z M 14 4 h 1 v 1 h -1 Z M 3 5 h 1 v 1 h -1 Z M 14 5 h 1 v 1 h -1 Z M 3 6 h 1 v 1 h -1 Z M 14 6 h 1 v 1 h -1 Z" fill="#FFAEBC" />
      <!-- Blush Cheeks -->
      <path d="M 2 13 h 2 v 1 h -2 Z M 13 13 h 2 v 1 h -2 Z M 2 14 h 2 v 1 h -2 Z M 13 14 h 2 v 1 h -2 Z" fill="#FF8B94" />
      <!-- Eyes & Mouth -->
      <path d="M 3 11 h 1 v 1 h -1 Z M 12 11 h 1 v 1 h -1 Z M 8 13 h 1 v 1 h -1 Z M 7 14 h 1 v 1 h -1 Z M 9 14 h 1 v 1 h -1 Z" fill="#1A252C" />
      <!-- Outline -->
      <path d="M 2 1 h 3 v 1 h -3 Z M 13 1 h 3 v 1 h -3 Z M 1 2 h 1 v 1 h -1 Z M 5 2 h 1 v 1 h -1 Z M 12 2 h 1 v 1 h -1 Z M 16 2 h 1 v 1 h -1 Z M 1 3 h 1 v 1 h -1 Z M 5 3 h 1 v 1 h -1 Z M 12 3 h 1 v 1 h -1 Z M 16 3 h 1 v 1 h -1 Z M 1 4 h 1 v 1 h -1 Z M 5 4 h 1 v 1 h -1 Z M 12 4 h 1 v 1 h -1 Z M 16 4 h 1 v 1 h -1 Z M 1 5 h 1 v 1 h -1 Z M 5 5 h 1 v 1 h -1 Z M 12 5 h 1 v 1 h -1 Z M 16 5 h 1 v 1 h -1 Z M 1 6 h 1 v 1 h -1 Z M 5 6 h 1 v 1 h -1 Z M 7 6 h 4 v 1 h -4 Z M 12 6 h 1 v 1 h -1 Z M 16 6 h 1 v 1 h -1 Z M 2 7 h 1 v 1 h -1 Z M 5 7 h 2 v 1 h -2 Z M 11 7 h 2 v 1 h -2 Z M 15 7 h 1 v 1 h -1 Z M 2 8 h 1 v 1 h -1 Z M 15 8 h 1 v 1 h -1 Z M 1 9 h 1 v 1 h -1 Z M 16 9 h 1 v 1 h -1 Z M 0 10 h 1 v 1 h -1 Z M 17 10 h 1 v 1 h -1 Z M 0 11 h 1 v 1 h -1 Z M 17 11 h 1 v 1 h -1 Z M 0 12 h 1 v 1 h -1 Z M 17 12 h 1 v 1 h -1 Z M 0 13 h 1 v 1 h -1 Z M 17 13 h 1 v 1 h -1 Z M 0 14 h 1 v 1 h -1 Z M 17 14 h 1 v 1 h -1 Z M 1 15 h 1 v 1 h -1 Z M 16 15 h 1 v 1 h -1 Z M 2 16 h 2 v 1 h -2 Z M 14 16 h 2 v 1 h -2 Z M 1 17 h 1 v 1 h -1 Z M 16 17 h 1 v 1 h -1 Z M 0 18 h 1 v 1 h -1 Z M 17 18 h 1 v 1 h -1 Z M 0 19 h 1 v 1 h -1 Z M 17 19 h 1 v 1 h -1 Z M 0 20 h 1 v 1 h -1 Z M 17 20 h 1 v 1 h -1 Z M 1 21 h 1 v 1 h -1 Z M 16 21 h 1 v 1 h -1 Z M 2 22 h 1 v 1 h -1 Z M 5 22 h 2 v 1 h -2 Z M 11 22 h 2 v 1 h -2 Z M 15 22 h 1 v 1 h -1 Z M 3 23 h 2 v 1 h -2 Z M 7 23 h 4 v 1 h -4 Z M 13 23 h 2 v 1 h -2 Z" fill="#1A252C" />
    </g>
  </defs>

  <!-- Background Base -->
  <rect width="1000" height="380" fill="#050816" />
  
  <!-- Cyber Grid -->
  <rect width="1000" height="380" fill="url(#grid)" />
  
  <!-- Soft Green Ambient Lights -->
  <circle cx="150" cy="190" r="180" fill="#00C896" opacity="0.08" filter="url(#neon-glow)" />
  <circle cx="850" cy="190" r="160" fill="#57F287" opacity="0.06" filter="url(#neon-glow)" />

  <!-- Top Thin Pixel Loading Bar -->
  <rect x="0" y="0" width="1000" height="4" fill="#0A0F24" />
  <rect class="loading-bar" x="0" y="0" width="0" height="4" fill="url(#loading-gradient)">
    <animate attributeName="width" values="0; 450; 800; 1000; 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.4; 0.7; 0.95; 1" />
  </rect>
  <linearGradient id="loading-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#2ECC71" />
    <stop offset="50%" stop-color="#00C896" />
    <stop offset="100%" stop-color="#57F287" />
  </linearGradient>

  <!-- Twinkling Stars in Sky (Pixel Art) -->
  <g class="star" style="animation-delay: 0.2s;">
    <!-- Cross Star 1 -->
    <path d="M 520 40 h 3 v 1 h -3 Z M 521 38 h 1 v 5 h -1 Z" fill="#98FB98" opacity="0.8" />
  </g>
  <g class="star" style="animation-delay: 1.5s;">
    <!-- Cross Star 2 -->
    <path d="M 700 30 h 3 v 1 h -3 Z M 701 28 h 1 v 5 h -1 Z" fill="#57F287" opacity="0.9" />
  </g>
  <g class="star" style="animation-delay: 0.8s;">
    <!-- Cross Star 3 -->
    <path d="M 880 50 h 3 v 1 h -3 Z M 881 48 h 1 v 5 h -1 Z" fill="#00C896" opacity="0.7" />
  </g>
  <g class="star" style="animation-delay: 2.2s;">
    <!-- Tiny Star 4 -->
    <rect x="610" y="70" width="2" height="2" fill="#FFFFFF" opacity="0.6" />
  </g>
  <g class="star" style="animation-delay: 1.0s;">
    <!-- Tiny Star 5 -->
    <rect x="940" y="60" width="2" height="2" fill="#FFFFFF" opacity="0.9" />
  </g>

  <!-- Slow Floating Pixel Clouds (Opacity layers) -->
  <g class="cloud" style="animation-duration: 35s;">
    <!-- Cloud shape 1 -->
    <path d="M 0 12 h 12 v -4 h 8 v -4 h 16 v 4 h 8 v 4 h 12 v 4 h -56 Z" fill="#FFFFFF" opacity="0.06" transform="scale(2) translate(10, 20)" />
  </g>
  <g class="cloud" style="animation-duration: 50s; animation-delay: -10s;">
    <!-- Cloud shape 2 -->
    <path d="M 0 8 h 16 v -4 h 12 v -4 h 16 v 4 h 8 v 4 h 8 v 4 h -60 Z" fill="#00C896" opacity="0.04" transform="scale(1.5) translate(250, 45)" />
  </g>

  <!-- Left Column Layout (Text, Terminal, Code) -->
  
  <!-- Terminal Prompt -->
  <g transform="translate(40, 45)">
    <!-- Terminal icon -->
    <rect x="0" y="0" width="16" height="12" rx="2" fill="#111827" stroke="#2ECC71" stroke-width="1.5" />
    <path d="M 4 4 L 7 6 L 4 8" fill="none" stroke="#2ECC71" stroke-width="1.5" />
    <text class="terminal-text" x="25" y="10">SYS_INIT :: Greetings, wanderer! I'm TEESHA.</text>
  </g>

  <!-- Hero Title -->
  <text class="hero-title" x="40" y="95" filter="url(#soft-glow)">HI THERE 👋</text>
  <text class="hero-title" x="40" y="135" fill="#57F287" filter="url(#soft-glow)">I'M TEESHA VERMA</text>
  
  <!-- Typing Subtitle -->
  <text class="hero-subtitle" x="40" y="170">
    Aspiring Cloud-Native Data Engineer
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
  </text>
  
  <!-- Interactive-Looking Cyber Code Editor Window -->
  <g transform="translate(40, 195)">
    <!-- Window Border & Glassmorphic Fill -->
    <rect x="0" y="0" width="460" height="145" rx="8" fill="#0A0E20" fill-opacity="0.85" stroke="#22C55E" stroke-width="1.5" class="glow-rect" opacity="0.9" />
    <!-- Window Title Bar -->
    <rect x="1" y="1" width="458" height="28" rx="7" fill="#060917" />
    <circle cx="15" cy="14" r="4.5" fill="#EF4444" />
    <circle cx="30" cy="14" r="4.5" fill="#F59E0B" />
    <circle cx="45" cy="14" r="4.5" fill="#10B981" />
    <text x="230" y="19" font-family="'Share Tech Mono', monospace" font-size="11" fill="#6B7280" text-anchor="middle">loop.js — TeeshaEngine</text>
    
    <!-- Code Snippet -->
    <g transform="translate(20, 38)">
      <!-- Line Numbers -->
      <text font-family="'Share Tech Mono', monospace" font-size="14" fill="#374151" x="0" y="20">1</text>
      <text font-family="'Share Tech Mono', monospace" font-size="14" fill="#374151" x="0" y="45">2</text>
      <text font-family="'Share Tech Mono', monospace" font-size="14" fill="#374151" x="0" y="70">3</text>
      <text font-family="'Share Tech Mono', monospace" font-size="14" fill="#374151" x="0" y="95">4</text>
      <text font-family="'Share Tech Mono', monospace" font-size="14" fill="#374151" x="0" y="120">5</text>

      <!-- Code Text with syntax highlighting -->
      <g transform="translate(25, 0)">
        <text class="code-font" x="0" y="20" fill="#F43F5E">while <tspan fill="#E2E8F0">(alive)</tspan> {</text>
        <text class="code-font" x="20" y="45" fill="#3B82F6">learn<tspan fill="#E2E8F0">();</tspan></text>
        <text class="code-font" x="20" y="70" fill="#3B82F6">build<tspan fill="#E2E8F0">();</tspan></text>
        <text class="code-font" x="20" y="95" fill="#3B82F6">repeat<tspan fill="#E2E8F0">();</tspan></text>
        <text class="code-font" x="0" y="120" fill="#F43F5E">}</text>
        <!-- Blinking cursor -->
        <rect x="105" y="82" width="8" height="15" fill="#57F287">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>
  </g>

  <!-- Right Column Layout (Mascot, Islands, equalizers) -->
  
  <!-- Dashed Jump Trajectory Curve -->
  <path d="M 650 220 Q 730 110 830 180" fill="none" stroke="#2ECC71" stroke-width="2.5" stroke-dasharray="6,6" opacity="0.3" />
  
  <!-- Floating Green Pixel Hearts rising from Islands -->
  <!-- Heart 1 (left island) -->
  <g transform="translate(620, 170)">
    <path d="M 1 0 h 1 v 1 h -1 Z M 3 0 h 1 v 1 h -1 Z M 0 1 h 5 v 2 h -5 Z M 1 3 h 3 v 1 h -3 Z M 2 4 h 1 v 1 h -1 Z" fill="#00C896">
      <animate attributeName="opacity" values="0; 0.9; 0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="transform" type="translate" values="0,0; -5,-40" dur="4s" repeatCount="indefinite" />
      <animate attributeName="transform" type="scale" values="1.5; 1" additive="sum" dur="4s" repeatCount="indefinite" />
    </path>
  </g>
  <!-- Heart 2 (right island) -->
  <g transform="translate(840, 130)">
    <path d="M 1 0 h 1 v 1 h -1 Z M 3 0 h 1 v 1 h -1 Z M 0 1 h 5 v 2 h -5 Z M 1 3 h 3 v 1 h -3 Z M 2 4 h 1 v 1 h -1 Z" fill="#57F287">
      <animate attributeName="opacity" values="0; 0.9; 0" dur="4.2s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="transform" type="translate" values="0,0; 8,-35" dur="4.2s" begin="2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Floating Island 1 (Left platform) -->
  <g transform="translate(560, 220)">
    <!-- Grass highlight -->
    <rect x="0" y="0" width="140" height="3" fill="#98FB98" />
    <!-- Grass body -->
    <rect x="0" y="3" width="140" height="7" fill="#2ECC71" />
    <!-- Dirt Pixelated Steps -->
    <rect x="10" y="10" width="120" height="10" fill="#5A3A22" />
    <rect x="25" y="20" width="90" height="10" fill="#442B1A" />
    <rect x="45" y="30" width="50" height="8" fill="#2D1C11" />
    <!-- Glowing outline -->
    <path d="M 0 0 h 140 v 10 L 130 10 v 10 L 115 20 v 10 L 95 30 v 8 h -50 v -8 L 25 30 v -10 L 10 10 L 0 10 Z" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.3" class="glow-rect" />
    <!-- Tiny flowers -->
    <!-- Flower 1 -->
    <rect x="20" y="-8" width="2" height="8" fill="#22C55E" />
    <rect x="19" y="-12" width="4" height="4" fill="#00C896" />
    <rect x="20" y="-10" width="2" height="2" fill="#FFFFFF" />
    <!-- Flower 2 -->
    <rect x="110" y="-6" width="2" height="6" fill="#22C55E" />
    <rect x="109" y="-9" width="4" height="3" fill="#57F287" />
  </g>

  <!-- Floating Island 2 (Right platform) -->
  <g transform="translate(760, 180)">
    <!-- Grass highlight -->
    <rect x="0" y="0" width="140" height="3" fill="#98FB98" />
    <!-- Grass body -->
    <rect x="0" y="3" width="140" height="7" fill="#2ECC71" />
    <!-- Dirt Pixelated Steps -->
    <rect x="10" y="10" width="120" height="10" fill="#5A3A22" />
    <rect x="25" y="20" width="90" height="10" fill="#442B1A" />
    <rect x="45" y="30" width="50" height="8" fill="#2D1C11" />
    <!-- Glowing outline -->
    <path d="M 0 0 h 140 v 10 L 130 10 v 10 L 115 20 v 10 L 95 30 v 8 h -50 v -8 L 25 30 v -10 L 10 10 L 0 10 Z" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.3" class="glow-rect" />
    <!-- Tiny flowers -->
    <rect x="90" y="-7" width="2" height="7" fill="#22C55E" />
    <rect x="88" y="-11" width="6" height="4" fill="#57F287" />
  </g>

  <!-- Jumping Bunny Mascot (uses the paths defined in defs) -->
  <use href="#bunny-mascot" class="jumping-bunny" />

  <!-- Bottom Right Mini Terminal Widget (Focus Equalizer) -->
  <g transform="translate(560, 285)">
    <!-- Widget Body -->
    <rect x="0" y="0" width="400" height="55" rx="6" fill="#080C1E" fill-opacity="0.8" stroke="#00C896" stroke-width="1.5" class="glow-rect" />
    
    <!-- Pulse Light -->
    <circle cx="20" cy="27" r="4.5" fill="#2ECC71">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Equalizer details & mode text -->
    <text font-family="'Share Tech Mono', monospace" font-size="12" fill="#E2E8F0" x="35" y="22">Focus Mode: <tspan fill="#57F287" font-weight="bold">ACTIVE</tspan></text>
    <text font-family="'Share Tech Mono', monospace" font-size="11" fill="#6B7280" x="35" y="38">Now Playing: Cyberpunk_Lofi.mp3</text>
    
    <!-- Equalizer bouncing bars (SMIL animated heights & positions relative to base y=42) -->
    <g transform="translate(280, 0)">
      <!-- Bar 1 -->
      <rect x="0" y="27" width="4" height="15" fill="#22C55E">
        <animate attributeName="height" values="6;22;12;28;6" dur="1s" repeatCount="indefinite" />
        <animate attributeName="y" values="36;20;30;14;36" dur="1s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 2 -->
      <rect x="8" y="22" width="4" height="20" fill="#2ECC71">
        <animate attributeName="height" values="10;28;6;22;10" dur="1.3s" repeatCount="indefinite" />
        <animate attributeName="y" values="32;14;36;20;32" dur="1.3s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 3 -->
      <rect x="16" y="25" width="4" height="17" fill="#57F287">
        <animate attributeName="height" values="18;8;26;12;18" dur="0.9s" repeatCount="indefinite" />
        <animate attributeName="y" values="24;34;16;30;24" dur="0.9s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 4 -->
      <rect x="24" y="20" width="4" height="22" fill="#00C896">
        <animate attributeName="height" values="12;24;18;8;12" dur="1.5s" repeatCount="indefinite" />
        <animate attributeName="y" values="30;18;24;36;30" dur="1.5s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 5 -->
      <rect x="32" y="32" width="4" height="10" fill="#98FB98">
        <animate attributeName="height" values="6;16;24;10;6" dur="1.1s" repeatCount="indefinite" />
        <animate attributeName="y" values="36;26;18;32;36" dur="1.1s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 6 -->
      <rect x="40" y="28" width="4" height="14" fill="#2ECC71">
        <animate attributeName="height" values="15;6;22;14;15" dur="1.2s" repeatCount="indefinite" />
        <animate attributeName="y" values="27;36;20;28;27" dur="1.2s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Retro Music Note -->
    <path d="M 345 22 h 8 v 4 h -8 Z M 351 18 h 2 v 8 h -2 Z M 345 26 h 3 v 4 h -3 Z" fill="#2ECC71">
      <animate attributeName="transform" type="translate" values="0,0; 0,-2; 0,0" dur="2s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
