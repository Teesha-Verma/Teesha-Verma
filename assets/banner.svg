<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .terminal-title {
        font-family: 'Share Tech Mono', 'Consolas', monospace;
        font-size: 13px;
        fill: #FF7597;
        letter-spacing: 0.5px;
      }
      
      .hero-greeting {
        font-family: 'Share Tech Mono', monospace;
        font-size: 20px;
        fill: #FFFFFF;
        font-weight: bold;
      }
      
      .hero-name {
        font-family: 'Press Start 2P', monospace;
        font-size: 30px;
        fill: #FF75A0;
        font-weight: bold;
      }
      
      .hero-sub-1 {
        font-family: 'Share Tech Mono', monospace;
        font-size: 18px;
        fill: #BD93F9;
      }
      
      .hero-sub-2 {
        font-family: 'Share Tech Mono', monospace;
        font-size: 18px;
        fill: #8BE9FD;
      }
      
      .code-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 16px;
      }
      
      .star-blink {
        animation: twinkle 3s infinite ease-in-out;
      }
      
      .floating-mascot {
        animation: jump-around 8s infinite ease-in-out;
        transform-origin: center;
      }
      
      .floater-cloud {
        animation: float-cloud 40s infinite linear;
      }

      .now-playing-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #6272A4;
      }
      
      .now-playing-title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #FFFFFF;
      }
      
      /* CSS Keyframes */
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      
      @keyframes float-cloud {
        0% { transform: translateX(1100px); }
        100% { transform: translateX(-200px); }
      }
      
      @keyframes jump-around {
        0%, 100% {
          transform: translate(525px, 170px) scale(1.8) rotate(0deg);
        }
        10% {
          transform: translate(525px, 175px) scale(1.8, 1.5) rotate(0deg);
        }
        25% {
          transform: translate(585px, 60px) scale(1.6, 2.0) rotate(5deg);
        }
        35% {
          transform: translate(650px, 90px) scale(1.8) rotate(0deg);
        }
        40% {
          transform: translate(670px, 139px) scale(1.8, 1.5) rotate(0deg);
        }
        45%, 50% {
          transform: translate(670px, 139px) scale(1.8) rotate(0deg);
        }
        55% {
          transform: translate(670px, 144px) scale(1.8, 1.5) rotate(0deg);
        }
        68% {
          transform: translate(740px, 70px) scale(1.6, 2.0) rotate(-5deg);
        }
        78% {
          transform: translate(800px, 95px) scale(1.8) rotate(0deg);
        }
        85% {
          transform: translate(820px, 139px) scale(1.8, 1.5) rotate(0deg);
        }
        90%, 95% {
          transform: translate(820px, 139px) scale(1.8) rotate(0deg);
        }
      }
    </style>

    <!-- Glowing Filters -->
    <filter id="pink-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Background -->
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6272A4" stroke-width="0.75" opacity="0.04" />
    </pattern>

    <!-- Cinnamoroll Mascot definition -->
    <g id="cinnamoroll-mascot">
      <!-- Left Ear -->
      <path d="M -12 -5 C -25 -5, -34 6, -26 12 C -20 14, -15 8, -10 1" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Right Ear -->
      <path d="M 12 -5 C 25 -5, 34 6, 26 12 C 20 14, 15 8, 10 1" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Body -->
      <path d="M -7 8 C -11 15, -11 20, -5 23 C 0 23, 0 21, 5 23 C 11 20, 11 15, 7 8 Z" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Left Arm -->
      <path d="M -8 10 C -15 9, -15 5, -10 7" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Right Arm -->
      <path d="M 8 10 C 15 9, 15 5, 10 7" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Left Foot -->
      <ellipse cx="-4" cy="22.5" rx="3" ry="1.8" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Right Foot -->
      <ellipse cx="4" cy="22.5" rx="3" ry="1.8" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Head -->
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Left Blush -->
      <ellipse cx="-11" cy="2.5" rx="2.5" ry="1.2" fill="#FF80A0" opacity="0.65" />
      <!-- Right Blush -->
      <ellipse cx="11" cy="2.5" rx="2.5" ry="1.2" fill="#FF80A0" opacity="0.65" />
      <!-- Left Eye -->
      <ellipse cx="-7" cy="-0.5" rx="1.2" ry="2" fill="#6BA4FF" />
      <!-- Right Eye -->
      <ellipse cx="7" cy="-0.5" rx="1.2" ry="2" fill="#6BA4FF" />
      <!-- Cute Mouth -->
      <path d="M -1.5 2.8 Q 0 4 1.5 2.8" fill="none" stroke="#1A252C" stroke-width="1" />
    </g>
  </defs>

  <!-- Canvas Background -->
  <rect width="1000" height="420" fill="#050814" />
  <rect width="1000" height="420" fill="url(#bg-grid)" />

  <!-- Soft Ambient Lights -->
  <circle cx="150" cy="180" r="180" fill="#FF75A0" opacity="0.04" filter="url(#pink-glow)" />
  <circle cx="750" cy="160" r="200" fill="#BD93F9" opacity="0.05" filter="url(#cyan-glow)" />

  <!-- Stars in Sky -->
  <g class="star-blink" style="animation-delay: 0.1s;">
    <path d="M 520 40 h 3 v 1 h -3 Z M 521 38 h 1 v 5 h -1 Z" fill="#BD93F9" opacity="0.6" />
  </g>
  <g class="star-blink" style="animation-delay: 1.4s;">
    <path d="M 780 30 h 3 v 1 h -3 Z M 781 28 h 1 v 5 h -1 Z" fill="#8BE9FD" opacity="0.8" />
  </g>
  <g class="star-blink" style="animation-delay: 2.2s;">
    <rect x="620" y="60" width="2" height="2" fill="#FFFFFF" opacity="0.5" />
  </g>
  <g class="star-blink" style="animation-delay: 0.8s;">
    <rect x="910" y="40" width="2" height="2" fill="#FFFFFF" opacity="0.8" />
  </g>

  <!-- Clouds -->
  <g class="floater-cloud" style="animation-duration: 45s; animation-delay: -5s;">
    <path d="M 0 10 h 20 v -6 h 15 v -6 h 20 v 6 h 10 v 6 h -65 Z" fill="#FFFFFF" opacity="0.03" transform="scale(1.8) translate(100, 15)" />
  </g>
  <g class="floater-cloud" style="animation-duration: 60s; animation-delay: -20s;">
    <path d="M 0 8 h 15 v -4 h 10 v -4 h 15 v 4 h 8 v 4 h -48 Z" fill="#8BE9FD" opacity="0.03" transform="scale(1.5) translate(450, 25)" />
  </g>

  <!-- Left Side content -->

  <!-- Top System Bar -->
  <g transform="translate(40, 25)">
    <!-- Thin red/orange line -->
    <rect x="0" y="0" width="80" height="3" fill="#FF5E7E" />
    <text class="terminal-title" x="95" y="10">Greetings, wanderer! I'm TEESHA!</text>
  </g>

  <!-- Greetings -->
  <text class="hero-greeting" x="40" y="70">Hi there 👋</text>
  <text class="hero-name" x="40" y="115" filter="url(#pink-glow)">I'M TEESHA VERMA</text>
  
  <text class="hero-sub-1" x="40" y="152">Aspiring Cloud-Native Data Engineer</text>
  <text class="hero-sub-2" x="40" y="177">Building Scalable Data &amp; AI Solutions</text>

  <!-- Code Block -->
  <g transform="translate(40, 205)">
    <!-- Card Frame -->
    <rect x="0" y="0" width="410" height="150" rx="8" fill="#040611" fill-opacity="0.85" stroke="#1A253C" stroke-width="1.5" />
    
    <!-- Code -->
    <g transform="translate(20, 25)">
      <text font-family="'Share Tech Mono', monospace" font-size="16" fill="#BD93F9" x="0" y="20">while<tspan fill="#FFFFFF">(</tspan><tspan fill="#8BE9FD">alive</tspan><tspan fill="#FFFFFF">) {</tspan></text>
      <text font-family="'Share Tech Mono', monospace" font-size="16" fill="#FF75A0" x="20" y="48">learn<tspan fill="#FFFFFF">();</tspan></text>
      <text font-family="'Share Tech Mono', monospace" font-size="16" fill="#FF75A0" x="20" y="76">build<tspan fill="#FFFFFF">();</tspan></text>
      <text font-family="'Share Tech Mono', monospace" font-size="16" fill="#FF75A0" x="20" y="104">repeat<tspan fill="#FFFFFF">();</tspan></text>
      <text font-family="'Share Tech Mono', monospace" font-size="16" fill="#BD93F9" x="0" y="132">}</text>
      
      <!-- Blinking Cursor -->
      <rect x="105" y="90" width="8" height="16" fill="#8BE9FD">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- Right Side content (Game Field & Mascot) -->

  <!-- Dashed Trajectory Line 1 (P1 to P2) -->
  <path d="M 545 170 Q 610 90 680 140" fill="none" stroke="#BD93F9" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.3" />
  <!-- Dashed Trajectory Line 2 (P2 to P3) -->
  <path d="M 700 140 Q 770 70 840 140" fill="none" stroke="#8BE9FD" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.3" />

  <!-- Speech bubble with heart -->
  <g transform="translate(860, 40)">
    <path d="M 0 0 h 30 v 20 h -10 l -5 5 l -2 -5 h -13 Z" fill="#FFFFFF" stroke="#1A253C" stroke-width="1.2" />
    <path d="M 7 5 Q 10 2 13 5 Q 16 2 19 5 L 13 13 Z" fill="#FF75A0" />
    <animate attributeName="transform" type="translate" values="860,40; 860,37; 860,40" dur="3s" repeatCount="indefinite" />
  </g>

  <!-- Platform 1 -->
  <g transform="translate(500, 210)">
    <!-- Dirt & Steps -->
    <rect x="5" y="10" width="80" height="8" fill="#5C4033" />
    <rect x="15" y="18" width="60" height="8" fill="#3D2B22" />
    <!-- Grass highlight -->
    <rect x="0" y="0" width="90" height="3" fill="#A2D248" />
    <!-- Grass body -->
    <rect x="0" y="3" width="90" height="7" fill="#4E8C2B" />
    <!-- Flowers -->
    <rect x="15" y="-6" width="2" height="6" fill="#4E8C2B" />
    <rect x="13" y="-9" width="6" height="3" fill="#FF75A0" />
    <rect x="25" y="-4" width="2" height="4" fill="#4E8C2B" />
    <rect x="23" y="-7" width="6" height="3" fill="#FFD166" />
  </g>

  <!-- Platform 2 -->
  <g transform="translate(630, 180)">
    <!-- Dirt & Steps -->
    <rect x="8" y="10" width="104" height="8" fill="#5C4033" />
    <rect x="20" y="18" width="80" height="8" fill="#3D2B22" />
    <!-- Grass highlight -->
    <rect x="0" y="0" width="120" height="3" fill="#A2D248" />
    <!-- Grass body -->
    <rect x="0" y="3" width="120" height="7" fill="#4E8C2B" />
    <!-- Small Plant -->
    <rect x="90" y="-8" width="2" height="8" fill="#4E8C2B" />
    <path d="M 86 -6 Q 90 -10 94 -6" fill="none" stroke="#A2D248" stroke-width="1.5" />
  </g>

  <!-- Platform 3 -->
  <g transform="translate(790, 180)">
    <!-- Dirt & Steps -->
    <rect x="8" y="10" width="84" height="8" fill="#5C4033" />
    <rect x="18" y="18" width="64" height="8" fill="#3D2B22" />
    <!-- Grass highlight -->
    <rect x="0" y="0" width="100" height="3" fill="#A2D248" />
    <!-- Grass body -->
    <rect x="0" y="3" width="100" height="7" fill="#4E8C2B" />
    <!-- Flower -->
    <rect x="50" y="-7" width="2" height="7" fill="#4E8C2B" />
    <rect x="48" y="-10" width="6" height="3" fill="#8BE9FD" />
  </g>

  <!-- Animated Cinnamoroll Mascot -->
  <use href="#cinnamoroll-mascot" class="floating-mascot" />

  <!-- Now Playing Terminal Widget -->
  <g transform="translate(640, 245)">
    <!-- Border Frame -->
    <rect x="0" y="0" width="280" height="50" rx="6" fill="#040611" fill-opacity="0.8" stroke="#1A253C" stroke-width="1.2" />
    
    <text class="now-playing-label" x="15" y="18">> Now Playing</text>
    <text class="now-playing-title" x="15" y="36">Focus Mode: <tspan fill="#50FA7B" font-weight="bold">ON</tspan></text>
    
    <!-- Blue/Purple Equalizer Bouncing Bars -->
    <g transform="translate(180, 10)">
      <!-- Bar 1 -->
      <rect x="0" y="15" width="3" height="15" fill="#BD93F9">
        <animate attributeName="height" values="4;20;8;24;4" dur="1.2s" repeatCount="indefinite" />
        <animate attributeName="y" values="21;5;17;1;21" dur="1.2s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 2 -->
      <rect x="6" y="10" width="3" height="20" fill="#FF75A0">
        <animate attributeName="height" values="8;24;4;18;8" dur="0.9s" repeatCount="indefinite" />
        <animate attributeName="y" values="17;1;21;7;17" dur="0.9s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 3 -->
      <rect x="12" y="12" width="3" height="18" fill="#8BE9FD">
        <animate attributeName="height" values="16;6;22;10;16" dur="1.5s" repeatCount="indefinite" />
        <animate attributeName="y" values="9;19;3;15;9" dur="1.5s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 4 -->
      <rect x="18" y="8" width="3" height="22" fill="#BD93F9">
        <animate attributeName="height" values="10;25;14;6;10" dur="1.1s" repeatCount="indefinite" />
        <animate attributeName="y" values="15;0;11;19;15" dur="1.1s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 5 -->
      <rect x="24" y="14" width="3" height="16" fill="#8BE9FD">
        <animate attributeName="height" values="5;18;9;22;5" dur="1.3s" repeatCount="indefinite" />
        <animate attributeName="y" values="20;7;16;3;20" dur="1.3s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 6 -->
      <rect x="30" y="14" width="3" height="16" fill="#FF75A0">
        <animate attributeName="height" values="12;6;18;8;12" dur="0.8s" repeatCount="indefinite" />
        <animate attributeName="y" values="13;19;7;17;13" dur="0.8s" repeatCount="indefinite" />
      </rect>
      <!-- Bar 7 -->
      <rect x="36" y="14" width="3" height="16" fill="#BD93F9">
        <animate attributeName="height" values="4;22;6;15;4" dur="1.4s" repeatCount="indefinite" />
        <animate attributeName="y" values="21;3;19;10;21" dur="1.4s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
