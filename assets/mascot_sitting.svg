<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 45" width="60" height="45">
  <!-- Sitting Cinnamoroll Mascot -->
  <g transform="translate(30, 20)">
    <!-- Body -->
    <path d="M -7 9 Q 0 15 7 9 C 11 17, 11 23, 7 26 Q 0 28 -7 26 Q -11 23 -7 9 Z" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    <!-- Left Foot -->
    <ellipse cx="-8" cy="25" rx="3" ry="1.8" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    <!-- Right Foot -->
    <ellipse cx="8" cy="25" rx="3" ry="1.8" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="16" ry="11" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    <!-- Left Ear -->
    <path d="M -12 -2 C -22 -2, -29 8, -23 12 C -19 13, -15 9, -12 4" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    <!-- Right Ear -->
    <path d="M 13 -2 C 24 -2, 31 8, 25 12 C 21 13, 17 9, 12 4" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    
    <!-- Blue Eyes -->
    <ellipse cx="-5" cy="0.5" rx="1" ry="1.6" fill="#6BA4FF" />
    <ellipse cx="5" cy="0.5" rx="1" ry="1.6" fill="#6BA4FF" />
    
    <!-- Pink Blush -->
    <ellipse cx="-9.5" cy="2.5" rx="1.8" ry="0.9" fill="#FF80A0" opacity="0.6" />
    <ellipse cx="9.5" cy="2.5" rx="1.8" ry="0.9" fill="#FF80A0" opacity="0.6" />
    
    <!-- Mouth -->
    <path d="M -1 2.5 Q 0 3.5 1 2.5" fill="none" stroke="#1A252C" stroke-width="0.8" />
  </g>
</svg>
