<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 140" width="230" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #6272A4;
        text-anchor: middle;
      }
      .tech-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #C5C9DB;
        text-anchor: middle;
      }
      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #1A253C;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      svg:hover .card-bg {
        stroke: #FFB86C;
        filter: url(#glow);
      }
    </style>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect class="card-bg" width="230" height="140" rx="6" />

  <!-- Title -->
  <text class="title" x="115" y="18">🛠️ Tools &amp; Others</text>

  <!-- Git -->
  <g transform="translate(18, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Git Orange Diamond -->
    <g transform="translate(10, 6) scale(0.8)">
      <rect x="2" y="2" width="16" height="16" rx="2" fill="#F05032" transform="rotate(45 10 10)" />
      <circle cx="10" cy="6" r="2" fill="#FFFFFF" />
      <circle cx="10" cy="14" r="2" fill="#FFFFFF" />
      <circle cx="14" cy="10" r="2" fill="#FFFFFF" />
      <line x1="10" y1="8" x2="10" y2="12" stroke="#FFFFFF" stroke-width="1.5" />
      <path d="M 10 10 Q 12 10 14 10" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
    </g>
    <text class="tech-label" x="18" y="47">Git</text>
  </g>

  <!-- GitHub -->
  <g transform="translate(97, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Github Octocat silhouette -->
    <path d="M 8 0 C 3.6 0 0 3.6 0 8 c 0 3.5 2.3 6.5 5.5 7.6 c 0.4 0.1 0.5 -0.2 0.5 -0.4 v -1.4 c -2.2 0.5 -2.7 -1.1 -2.7 -1.1 c -0.4 -0.9 -0.9 -1.2 -0.9 -1.2 c -0.7 -0.5 0.1 -0.5 0.1 -0.5 c 0.8 0.1 1.2 0.8 1.2 0.8 c 0.7 1.2 1.9 0.9 2.3 0.7 c 0.1 -0.5 0.3 -0.9 0.5 -1.1 c -1.8 -0.2 -3.6 -0.9 -3.6 -4 c 0 -0.9 0.3 -1.6 0.8 -2.1 c -0.1 -0.2 -0.4 -1 0.1 -2.1 c 0 0 0.7 -0.2 2.2 0.8 c 0.6 -0.2 1.3 -0.3 2 -0.3 c 0.7 0 1.4 0.1 2 0.3 c 1.5 -1 2.2 -0.8 2.2 -0.8 c 0.5 1.1 0.2 1.9 0.1 2.1 c 0.5 0.5 0.8 1.2 0.8 2.1 c 0 3.1 -1.9 3.7 -3.7 3.9 c 0.3 0.3 0.6 0.8 0.6 1.6 v 2.4 c 0 0.2 0.1 0.5 0.5 0.4 C 13.7 14.5 16 11.5 16 8 C 16 3.6 12.4 0 8 0 Z" fill="#FFFFFF" transform="translate(10, 6) scale(1)" />
    <text class="tech-label" x="18" y="47">GitHub</text>
  </g>

  <!-- Docker -->
  <g transform="translate(176, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Docker Whale -->
    <path d="M 2 12 c 1 0.5 2.5 0.5 4 0 c 1.5 -0.5 2 -1.5 2 -2 h 12 c 0 2.5 -2 4.5 -4.5 4.5 h -10.5 C 3 14.5 2 13.5 2 12 M 16 6 h 2 v 2 h -2 Z M 13 6 h 2 v 2 h -2 Z M 16 3 h 2 v 2 h -2 Z" fill="#2496ED" transform="translate(6, 6) scale(0.9)" />
    <text class="tech-label" x="18" y="47">Docker</text>
  </g>

  <!-- VS Code (Centered Below 1) -->
  <g transform="translate(58, 82)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- VS Code blue ribbon -->
    <path d="M 18 1 L 11 8 L 5 4 L 1 7 L 1 13 L 5 16 L 11 12 L 18 19 L 20 17 L 20 3 Z M 14 7 L 17 10 L 14 13 L 11 10 Z" fill="#007ACC" transform="translate(8, 8) scale(0.8)" />
    <text class="tech-label" x="18" y="47">VS Code</text>
  </g>

  <!-- Postman (Centered Below 2) -->
  <g transform="translate(136, 82)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Postman Orange Spaceman -->
    <g transform="translate(9, 5) scale(0.9)">
      <circle cx="10" cy="6" r="4.5" fill="#FF6C37" />
      <path d="M 5 11 h 10 v 4 a 2 2 0 0 1 -2 2 h -6 a 2 2 0 0 1 -2 -2 Z" fill="#FF6C37" />
      <polygon points="5,11 1,14 1,17 4,14" fill="#FF6C37" />
      <polygon points="15,11 19,14 19,17 16,14" fill="#FF6C37" />
      <rect x="7" y="3" width="6" height="3" fill="#FFFFFF" opacity="0.3" />
    </g>
    <text class="tech-label" x="18" y="47">Postman</text>
  </g>
</svg>