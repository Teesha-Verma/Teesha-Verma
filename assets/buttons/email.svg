<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 30" width="110" height="30">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .btn-bg {
        fill: #080C16;
        stroke: #222F47;
        stroke-width: 1;
        transition: all 0.3s ease;
      }
      .btn-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #C5C9DB;
        transition: all 0.3s ease;
      }
      svg:hover .btn-bg {
        fill: #0F1626;
        stroke: #FF75A0;
      }
      svg:hover .btn-text {
        fill: #FFFFFF;
      }
    </style>
  </defs>
  <!-- Background -->
  <rect class="btn-bg" x="0.5" y="0.5" width="109" height="29" rx="4" />
  
  <!-- Gmail Colorful Logo -->
  <g transform="translate(12, 7)">
    <!-- Red M with colors -->
    <path d="M 1.5 1 h 2.5 v 11 h -2.5 Z" fill="#EA4335" />
    <path d="M 12 1 h 2.5 v 11 h -2.5 Z" fill="#EA4335" />
    <path d="M 1.5 1 L 8 6 L 14.5 1 V 3 L 8 8 L 1.5 3 Z" fill="#FBBC05" />
    <path d="M 1.5 1 h 13 v 2.5 h -13 Z" fill="#34A853" opacity="0.8" />
    <path d="M 1.5 1 L 8 6 L 14.5 1 Z" fill="#4285F4" />
  </g>

  <!-- Text -->
  <text class="btn-text" x="35" y="19">Email</text>
</svg>
