<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 30" width="110" height="30">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .btn-bg {
        fill: #080C16;
        stroke: #222F47;
        stroke-width: 1;
        transition: all 0.3s ease;
      }
      .btn-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #C5C9DB;
        transition: all 0.3s ease;
      }
      svg:hover .btn-bg {
        fill: #0F1626;
        stroke: #5275A1;
      }
      svg:hover .btn-text {
        fill: #FFFFFF;
      }
    </style>
  </defs>
  <!-- Background -->
  <rect class="btn-bg" x="0.5" y="0.5" width="109" height="29" rx="4" />
  
  <!-- LinkedIn Logo -->
  <g transform="translate(12, 7)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="#0077B5" />
    <path d="M 3 6 h 2 v 6 h -2 Z M 4 3 a 1.2 1.2 0 1 1 0 2.4 a 1.2 1.2 0 1 1 0 -2.4 Z M 7 6 h 2 v 1 a 2.5 2.5 0 0 1 2.2 -1.2 c 2.2 0 2.8 1.4 2.8 3.2 v 3 h -2 v -3 c 0 -0.8 -0.3 -1.2 -1 -1.2 c -0.6 0 -1 0.4 -1 1.2 v 3 h -3 Z" fill="#FFFFFF" />
  </g>

  <!-- Text -->
  <text class="btn-text" x="35" y="19">LinkedIn</text>
</svg>
