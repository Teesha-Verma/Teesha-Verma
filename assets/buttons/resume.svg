<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 30" width="110" height="30">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .btn-bg {
        fill: #080C16;
        stroke: #222F47;
        stroke-width: 1;
        transition: all 0.3s ease;
      }
      .btn-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #C5C9DB;
        transition: all 0.3s ease;
      }
      svg:hover .btn-bg {
        fill: #0F1626;
        stroke: #BD93F9;
      }
      svg:hover .btn-text {
        fill: #FFFFFF;
      }
    </style>
  </defs>
  <!-- Background -->
  <rect class="btn-bg" x="0.5" y="0.5" width="109" height="29" rx="4" />
  
  <!-- Cyber Document Icon -->
  <g transform="translate(14, 7)" fill="none" stroke="#BD93F9" stroke-width="1.2">
    <rect x="0" y="0" width="12" height="15" rx="1" />
    <line x1="3" y1="4" x2="9" y2="4" />
    <line x1="3" y1="8" x2="9" y2="8" />
    <line x1="3" y1="11" x2="7" y2="11" />
  </g>

  <!-- Text -->
  <text class="btn-text" x="35" y="19">Resume</text>
</svg>
