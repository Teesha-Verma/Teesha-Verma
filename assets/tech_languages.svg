<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 90" width="180" height="90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #6272A4;
        text-anchor: middle;
      }
      .tech-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #C5C9DB;
        text-anchor: middle;
      }
      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #1A253C;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      svg:hover .card-bg {
        stroke: #FF75A0;
        filter: url(#glow);
      }
    </style>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect class="card-bg" width="180" height="90" rx="6" />

  <!-- Title -->
  <text class="title" x="90" y="18">⚙️ Languages</text>

  <!-- Java -->
  <g transform="translate(18, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Java Cup path -->
    <path d="M 12 18 c -1.5 0 -2 -1 -2 -2 c 0 -2.5 3 -2.5 3 -5 c 0 -1.5 -1 -2 -1 -2 s 1 0.5 1 1.5 c 0 2 -3 2.5 -3 4.5 c 0 1.5 1 2 2 2 M 17 15 c -1.5 0 -2 -1 -2 -2 c 0 -2 3 -2.5 3 -4.5 c 0 -1 -1 -1.5 -1 -1.5 s 1 0.5 1 1 c 0 2.5 -3 2.5 -3 4.5 c 0 1 1 1.5 2 1.5 M 10 24 h 14 c 1 0 2.5 -0.5 2.5 -2.5 c 0 -2 -1.5 -2.5 -2.5 -2.5 h -14 Z M 21 19 h 2 c 1 0 1.5 0.5 1.5 1 c 0 1 -0.5 1.5 -1.5 1.5 h -2 M 8 26 h 16 c 1.5 0 2.5 -0.5 2.5 -1.5 h -21" fill="#E76F51" />
    <text class="tech-label" x="18" y="47">Java</text>
  </g>

  <!-- Python -->
  <g transform="translate(72, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <g transform="translate(10, 6) scale(0.7)">
      <!-- Blue Snake -->
      <path d="M 9 0 h -4.5 a 4.5 4.5 0 0 0 -4.5 4.5 v 3 a 4.5 4.5 0 0 0 4.5 4.5 h 1 v -1.5 a 2.5 2.5 0 0 1 2.5 -2.5 h 4.5 a 2.5 2.5 0 0 0 2.5 -2.5 v -3 a 4.5 4.5 0 0 0 -4.5 -4.5 z M 5 2.5 a 0.8 0.8 0 1 1 0 1.6 a 0.8 0.8 0 0 1 0 -1.6 Z" fill="#3776AB" />
      <!-- Yellow Snake -->
      <path d="M 12 21 h 4.5 a 4.5 4.5 0 0 0 4.5 -4.5 v -3 a 4.5 4.5 0 0 0 -4.5 -4.5 h -1 v 1.5 a 2.5 2.5 0 0 1 -2.5 2.5 h -4.5 a 2.5 2.5 0 0 0 -2.5 2.5 v 3 a 4.5 4.5 0 0 0 4.5 4.5 z M 16 18.5 a 0.8 0.8 0 1 1 0 -1.6 a 0.8 0.8 0 0 1 0 1.6 Z" fill="#FFE873" />
    </g>
    <text class="tech-label" x="18" y="47">Python</text>
  </g>

  <!-- SQL -->
  <g transform="translate(126, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Cylinder database icon in blue -->
    <g transform="translate(11, 7)" fill="none" stroke="#00C896" stroke-width="1.5">
      <ellipse cx="7" cy="3" rx="6" ry="2" fill="#00C896" fill-opacity="0.2" />
      <path d="M 1 3 v 4 a 6 2 0 0 0 12 0 v -4" />
      <path d="M 1 7 v 4 a 6 2 0 0 0 12 0 v -4" />
    </g>
    <text class="tech-label" x="18" y="47">SQL</text>
  </g>
</svg>