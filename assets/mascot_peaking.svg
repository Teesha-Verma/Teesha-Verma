<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="80" height="40">
  <defs>
    <!-- Pixel Heart -->
    <g id="mini-heart">
      <path d="M 1 0 h 1 v 1 h -1 Z M 3 0 h 1 v 1 h -1 Z M 0 1 h 5 v 2 h -5 Z M 1 3 h 3 v 1 h -3 Z M 2 4 h 1 v 1 h -1 Z" fill="#FF75A0" />
    </g>
    <style>
      .heart-float {
        animation: float-heart 2s infinite ease-in-out;
      }
      @keyframes float-heart {
        0%, 100% { transform: translateY(0px); opacity: 0.6; }
        50% { transform: translateY(-4px); opacity: 1; }
      }
    </style>
  </defs>
  
  <!-- Floating Hearts -->
  <use href="#mini-heart" x="12" y="8" class="heart-float" />
  <use href="#mini-heart" x="63" y="12" class="heart-float" style="animation-delay: 1s;" />

  <!-- Peaking Mascot -->
  <g>
    <!-- Left Ear -->
    <path d="M 25 24 C 14 20, 8 28, 14 34 C 18 36, 22 32, 25 28" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    <!-- Right Ear -->
    <path d="M 55 24 C 66 20, 72 28, 66 34 C 62 36, 58 32, 55 28" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    
    <!-- Head -->
    <ellipse cx="40" cy="26" rx="16" ry="11" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    
    <!-- Eyes -->
    <ellipse cx="35" cy="26.5" rx="1" ry="1.6" fill="#6BA4FF" />
    <ellipse cx="45" cy="26.5" rx="1" ry="1.6" fill="#6BA4FF" />
    <!-- Blush -->
    <ellipse cx="30.5" cy="28.5" rx="1.8" ry="0.9" fill="#FF80A0" opacity="0.6" />
    <ellipse cx="49.5" cy="28.5" rx="1.8" ry="0.9" fill="#FF80A0" opacity="0.6" />
    <!-- Mouth -->
    <path d="M 39 28.5 Q 40 29.5 41 28.5" fill="none" stroke="#1A252C" stroke-width="0.8" />

    <!-- Paws holding edge -->
    <ellipse cx="27" cy="36" rx="3" ry="2.2" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
    <ellipse cx="53" cy="36" rx="3" ry="2.2" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
  </g>
</svg>
