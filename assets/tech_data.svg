<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 140" width="230" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #6272A4;
        text-anchor: middle;
      }
      .tech-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #C5C9DB;
        text-anchor: middle;
      }
      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #1A253C;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      svg:hover .card-bg {
        stroke: #50FA7B;
        filter: url(#glow);
      }
    </style>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect class="card-bg" width="230" height="140" rx="6" />

  <!-- Title -->
  <text class="title" x="115" y="18">🗄️ Data Engineering</text>

  <!-- PostgreSQL -->
  <g transform="translate(18, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Elephant logo -->
    <path d="M 24 16 c 1.5 -1 2.5 -3 2.5 -5 c 0 -3 -2.5 -5 -5.5 -5 c -3.5 0 -5 2 -6.5 4 c -1 1 -2.5 1.5 -4.5 1.5 h -1.5 v 2 h 1.5 c 1.5 0 2.5 -0.5 3.5 -1.5 c 1 -1 2 -2.5 4.5 -2.5 c 2 0 3.5 1 3.5 3 c 0 1.5 -1 2.5 -2.5 3 h -3 v 2 Z" fill="#336791" transform="translate(4, 4) scale(0.9)" />
    <path d="M 12 18 c -1.5 0 -2.5 1 -2.5 2.5 s 1 2.5 2.5 2.5 h 8 v -5 Z" fill="#336791" transform="translate(4, 4) scale(0.9)" />
    <text class="tech-label" x="18" y="47">PostgreSQL</text>
  </g>

  <!-- Spark -->
  <g transform="translate(97, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Spark flame/logo -->
    <path d="M 8 18 c 0.5 -1.5 1.5 -3 3 -4 c -1 2.5 -0.5 4 0.5 5.5 c 1 -1.5 2 -2 3.5 -2 c -1.5 2 -1 4 0.5 5.5 c 1.5 -2.5 3.5 -3.5 6 -3.5 c -3.5 4 -3 7.5 -0.5 9.5 c -5 0 -8 -2.5 -8.5 -7.5 c -1.5 2 -2.5 2 -4 1.5 c 2.5 -2 1.5 -4 -0.5 -5" fill="#E25A1C" transform="translate(3, 1) scale(0.9)" />
    <text class="tech-label" x="18" y="47">Spark</text>
  </g>

  <!-- Delta Lake -->
  <g transform="translate(176, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Delta triangle logo -->
    <polygon points="18,7 28,24 8,24" fill="none" stroke="#00ADEF" stroke-width="2" />
    <polygon points="18,12 24,22 12,22" fill="#00ADEF" opacity="0.3" />
    <text class="tech-label" x="18" y="47">Delta Lake</text>
  </g>

  <!-- Parquet (Centered Below) -->
  <g transform="translate(97, 82)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Columns pattern -->
    <g transform="translate(10, 8)" fill="#00C896">
      <rect x="0" y="0" width="4" height="12" />
      <rect x="6" y="2" width="4" height="10" />
      <rect x="12" y="0" width="4" height="12" />
    </g>
    <text class="tech-label" x="18" y="47">Parquet</text>
  </g>
</svg>