<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Share+Tech+Mono&amp;display=swap');
      .glow { filter: url(#neon-glow); }
      .title {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #57F287;
        text-anchor: middle;
      }
      .decor-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #3E5B45;
      }
      .flow-arrow {
        stroke: #57F287;
        stroke-width: 1.5;
        stroke-dasharray: 4, 3;
        animation: dash 5s infinite linear;
      }
      @keyframes dash {
        to { stroke-dashoffset: -20; }
      }
    </style>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="160" fill="#050816" />
  <rect width="320" height="160" fill="#0A0D20" fill-opacity="0.5" />
  
  <!-- Grid overlay -->
  <path d="M 0 20 L 320 20 M 0 40 L 320 40 M 0 60 L 320 60 M 0 80 L 320 80 M 0 100 L 320 100 M 0 120 L 320 120 M 0 140 L 320 140" fill="none" stroke="#2ECC71" stroke-width="0.5" opacity="0.05" />
  <path d="M 40 0 L 40 160 M 80 0 L 80 160 M 120 0 L 120 160 M 160 0 L 160 160 M 200 0 L 200 160 M 240 0 L 240 160 M 280 0 L 280 160" fill="none" stroke="#2ECC71" stroke-width="0.5" opacity="0.05" />

  <!-- Neon Border -->
  <rect x="1.5" y="1.5" width="317" height="157" rx="6" fill="none" stroke="#2ECC71" stroke-width="1.5" class="glow" opacity="0.8" />
  
  <!-- Cyber Corner Tech Ticks -->
  <path d="M 10 5 h 10 M 5 10 v 10 M 310 5 h -10 M 315 10 v 10 M 10 155 h 10 M 5 150 v -10 M 310 155 h -10 M 315 150 v -10" stroke="#57F287" stroke-width="1.5" fill="none" />

  <!-- Pipeline Flow Components -->
  <g transform="translate(30, 20)">
    <!-- Source DB Cylinder (x=0, y=10) -->
    <g transform="translate(10, 0)">
      <path d="M 0 5 a 12 4 0 0 0 24 0 a 12 4 0 0 0 -24 0 v 15 a 12 4 0 0 0 24 0 v -15" fill="none" stroke="#00C896" stroke-width="1.5" class="glow" />
      <path d="M 0 10 a 12 4 0 0 0 24 0" fill="none" stroke="#00C896" stroke-width="1.5" opacity="0.5" />
      <path d="M 0 15 a 12 4 0 0 0 24 0" fill="none" stroke="#00C896" stroke-width="1.5" opacity="0.5" />
      <text x="12" y="-3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">SRC</text>
    </g>

    <!-- Flow Arrow 1 -->
    <path d="M 40 12 h 50" fill="none" class="flow-arrow" />
    <path d="M 90 12 l -4 -3 v 6 Z" fill="#57F287" />

    <!-- Spark Sparkle (x=105, y=0) -->
    <g transform="translate(105, 0)">
      <polygon points="15,0 18,10 28,12 18,14 15,24 12,14 2,12 12,10" fill="#FFFFFF" stroke="#2ECC71" stroke-width="1.5" class="glow" />
      <text x="15" y="-3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">SPARK</text>
    </g>

    <!-- Flow Arrow 2 -->
    <path d="M 140 12 h 50" fill="none" class="flow-arrow" />
    <path d="M 190 12 l -4 -3 v 6 Z" fill="#57F287" />

    <!-- Delta Lake Storage Cloud/Tri (x=205, y=2) -->
    <g transform="translate(205, 0)">
      <!-- Delta Triangle -->
      <polygon points="18,0 36,20 0,20" fill="none" stroke="#00C896" stroke-width="1.5" class="glow" />
      <polygon points="18,5 30,17 6,17" fill="#0A0D20" opacity="0.5" />
      <text x="18" y="-3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">DELTA</text>
    </g>
  </g>

  <!-- Decorative text inside card -->
  <text x="20" y="145" class="decor-text">&lt;DATA_PIPELINE_STABLE&gt;</text>
  <text x="300" y="145" class="decor-text" text-anchor="end">SPARK_STREAMING</text>

  <!-- Card Title -->
  <text x="160" y="105" class="title">CLOUD DATA PIPELINE</text>
</svg>
