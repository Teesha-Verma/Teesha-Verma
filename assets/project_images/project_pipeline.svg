<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="300" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        fill: #FFB86C;
        font-weight: bold;
      }
      .desc {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #C5C9DB;
      }
      .tags {
        font-family: 'Share Tech Mono', monospace;
        font-size: 10px;
        fill: #FFB86C;
      }
      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #FFB86C;
        stroke-opacity: 0.3;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      svg:hover .card-bg {
        stroke-opacity: 1;
        stroke: #FFB86C;
        filter: url(#glow);
      }
      .flow-line {
        stroke: #FFB86C;
        stroke-width: 1.5;
        stroke-dasharray: 4, 3;
        animation: pipeline-dash 4s infinite linear;
      }
      @keyframes pipeline-dash {
        to { stroke-dashoffset: -20; }
      }
    </style>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect class="card-bg" width="300" height="220" rx="8" />

  <!-- Top bar (Icon + Title) -->
  <g transform="translate(15, 15)">
    <!-- DB/Stats Icon -->
    <path d="M 0 2 C 0 0, 14 0, 14 2 v 2 C 14 6, 0 6, 0 4 Z M 0 5 v 2 C 0 9, 14 9, 14 7 v -2 M 0 9 v 2 C 0 13, 14 13, 14 11 v -2" fill="none" stroke="#FFB86C" stroke-width="1.5" />
    <text class="title" x="24" y="11">Data Engineering Pipeline</text>
  </g>

  <!-- Illustration (Extract -> Transform -> Load) -->
  <g transform="translate(40, 42)">
    <!-- 3 Databases/Nodes representing ETL -->
    <!-- Node 1: Extract (Blue DB) -->
    <g transform="translate(0, 4)">
      <path d="M 0 3 a 10 3 0 0 0 20 0 a 10 3 0 0 0 -20 0 v 10 a 10 3 0 0 0 20 0 v -10" fill="none" stroke="#8BE9FD" stroke-width="1.5" />
      <path d="M 0 6 a 10 3 0 0 0 20 0" fill="none" stroke="#8BE9FD" stroke-width="1.5" opacity="0.6" />
      <text x="10" y="-3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#8BE9FD" text-anchor="middle">Extract</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 28 14 h 45" fill="none" class="flow-line" />

    <!-- Node 2: Transform (Purple DB) -->
    <g transform="translate(85, 4)">
      <path d="M 0 3 a 10 3 0 0 0 20 0 a 10 3 0 0 0 -20 0 v 10 a 10 3 0 0 0 20 0 v -10" fill="none" stroke="#BD93F9" stroke-width="1.5" />
      <path d="M 0 6 a 10 3 0 0 0 20 0" fill="none" stroke="#BD93F9" stroke-width="1.5" opacity="0.6" />
      <text x="10" y="-3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#BD93F9" text-anchor="middle">Transform</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 113 14 h 45" fill="none" class="flow-line" />

    <!-- Node 3: Load (Pink DB) -->
    <g transform="translate(170, 4)">
      <path d="M 0 3 a 10 3 0 0 0 20 0 a 10 3 0 0 0 -20 0 v 10 a 10 3 0 0 0 20 0 v -10" fill="none" stroke="#FF75A0" stroke-width="1.5" />
      <path d="M 0 6 a 10 3 0 0 0 20 0" fill="none" stroke="#FF75A0" stroke-width="1.5" opacity="0.6" />
      <text x="10" y="-3" font-family="'Share Tech Mono', monospace" font-size="8" fill="#FF75A0" text-anchor="middle">Load</text>
    </g>
  </g>

  <!-- Description -->
  <g transform="translate(15, 115)">
    <text class="desc" x="0" y="15">End-to-end data pipeline using Spark,</text>
    <text class="desc" x="0" y="31">Delta Lake and Azure Data Lake Storage</text>
    <text class="desc" x="0" y="47">for scalable analytics.</text>
  </g>

  <!-- Tags -->
  <g transform="translate(15, 185)">
    <circle cx="4" cy="7" r="3" fill="#FFB86C" />
    <text class="tags" x="12" y="10">Spark • Delta Lake • Azure • Parquet</text>
  </g>
</svg>
