<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Share+Tech+Mono&amp;display=swap');
      .glow { filter: url(#neon-glow); }
      .title {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #57F287;
        text-anchor: middle;
      }
      .decor-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #3E5B45;
      }
      .binary {
        font-family: 'Share Tech Mono', monospace;
        font-size: 8px;
        fill: #2ECC71;
        opacity: 0.15;
      }
    </style>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="160" fill="#050816" />
  <rect width="320" height="160" fill="#0A0D20" fill-opacity="0.5" />
  
  <!-- Grid overlay -->
  <path d="M 0 20 L 320 20 M 0 40 L 320 40 M 0 60 L 320 60 M 0 80 L 320 80 M 0 100 L 320 100 M 0 120 L 320 120 M 0 140 L 320 140" fill="none" stroke="#2ECC71" stroke-width="0.5" opacity="0.05" />
  <path d="M 40 0 L 40 160 M 80 0 L 80 160 M 120 0 L 120 160 M 160 0 L 160 160 M 200 0 L 200 160 M 240 0 L 240 160 M 280 0 L 280 160" fill="none" stroke="#2ECC71" stroke-width="0.5" opacity="0.05" />

  <!-- Neon Border -->
  <rect x="1.5" y="1.5" width="317" height="157" rx="6" fill="none" stroke="#2ECC71" stroke-width="1.5" class="glow" opacity="0.8" />
  
  <!-- Cyber Corner Tech Ticks -->
  <path d="M 10 5 h 10 M 5 10 v 10 M 310 5 h -10 M 315 10 v 10 M 10 155 h 10 M 5 150 v -10 M 310 155 h -10 M 315 150 v -10" stroke="#57F287" stroke-width="1.5" fill="none" />

  <!-- Binary Background Rain -->
  <text x="20" y="30" class="binary">10100101</text>
  <text x="20" y="50" class="binary">01101010</text>
  <text x="20" y="70" class="binary">11001100</text>
  <text x="260" y="30" class="binary">01011010</text>
  <text x="260" y="50" class="binary">10101010</text>
  <text x="260" y="70" class="binary">00110011</text>

  <!-- Illustration Group: Lock & Shield -->
  <g transform="translate(130, 20)">
    <!-- Shield Outline in Pixels -->
    <path d="M 0 10 h 60 v 15 L 30 50 L 0 25 Z" fill="none" stroke="#00C896" stroke-width="2" class="glow" />
    <path d="M 5 13 h 50 v 10 L 30 44 L 5 23 Z" fill="#0A0D20" fill-opacity="0.6" />
    
    <!-- Lock Mascot (Pixel-art Style) -->
    <!-- Shackle -->
    <path d="M 22 14 h 16 v 8 h -4 v -4 h -8 v 4 h -4 Z" fill="#FFFFFF" />
    <!-- Lock Body -->
    <rect x="18" y="22" width="24" height="16" rx="2" fill="#57F287" />
    <!-- Lock Keyhole -->
    <circle cx="30" cy="28" r="2.5" fill="#050816" />
    <rect x="29" y="29" width="2" height="6" fill="#050816" />
    
    <!-- Sparkles -->
    <rect x="10" y="10" width="3" height="3" fill="#FFFFFF" />
    <rect x="48" y="30" width="2" height="2" fill="#57F287" />
  </g>

  <!-- Decorative text inside card -->
  <text x="20" y="145" class="decor-text">&lt;SYS_SECURE&gt;</text>
  <text x="300" y="145" class="decor-text" text-anchor="end">CONFIDENCE_LVL: 99.8%</text>

  <!-- Card Title -->
  <text x="160" y="105" class="title">CODEGUARD AI</text>
</svg>
