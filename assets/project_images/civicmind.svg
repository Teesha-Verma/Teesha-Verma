<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Share+Tech+Mono&amp;display=swap');
      .glow { filter: url(#neon-glow); }
      .title {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        fill: #57F287;
        text-anchor: middle;
      }
      .decor-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #3E5B45;
      }
      .node-line {
        stroke: #2ECC71;
        stroke-width: 1;
        stroke-dasharray: 2, 2;
        opacity: 0.3;
      }
    </style>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="160" fill="#050816" />
  <rect width="320" height="160" fill="#0A0D20" fill-opacity="0.5" />
  
  <!-- Grid overlay -->
  <path d="M 0 20 L 320 20 M 0 40 L 320 40 M 0 60 L 320 60 M 0 80 L 320 80 M 0 100 L 320 100 M 0 120 L 320 120 M 0 140 L 320 140" fill="none" stroke="#2ECC71" stroke-width="0.5" opacity="0.05" />
  <path d="M 40 0 L 40 160 M 80 0 L 80 160 M 120 0 L 120 160 M 160 0 L 160 160 M 200 0 L 200 160 M 240 0 L 240 160 M 280 0 L 280 160" fill="none" stroke="#2ECC71" stroke-width="0.5" opacity="0.05" />

  <!-- Neon Border -->
  <rect x="1.5" y="1.5" width="317" height="157" rx="6" fill="none" stroke="#2ECC71" stroke-width="1.5" class="glow" opacity="0.8" />
  
  <!-- Cyber Corner Tech Ticks -->
  <path d="M 10 5 h 10 M 5 10 v 10 M 310 5 h -10 M 315 10 v 10 M 10 155 h 10 M 5 150 v -10 M 310 155 h -10 M 315 150 v -10" stroke="#57F287" stroke-width="1.5" fill="none" />

  <!-- AI network nodes -->
  <line x1="80" y1="40" x2="160" y2="40" class="node-line" />
  <line x1="160" y1="40" x2="240" y2="40" class="node-line" />
  <line x1="160" y1="40" x2="160" y2="60" class="node-line" />
  <circle cx="80" cy="40" r="3" fill="#00C896" class="glow" />
  <circle cx="240" cy="40" r="3" fill="#00C896" class="glow" />

  <!-- Illustration Group: Robot Head -->
  <g transform="translate(136, 15)">
    <!-- Ears -->
    <rect x="-6" y="18" width="6" height="12" fill="#2ECC71" rx="1" />
    <rect x="48" y="18" width="6" height="12" fill="#2ECC71" rx="1" />
    <!-- Antennas -->
    <line x1="24" y1="8" x2="24" y2="0" stroke="#57F287" stroke-width="2" />
    <circle cx="24" cy="0" r="3" fill="#57F287" class="glow" />

    <!-- Head Body -->
    <rect x="0" y="8" width="48" height="32" rx="4" fill="#FFFFFF" stroke="#00C896" stroke-width="2" />
    <rect x="4" y="12" width="40" height="14" fill="#050816" rx="2" />
    
    <!-- Glowing Robot Eyes -->
    <rect x="8" y="17" width="10" height="4" fill="#57F287" class="glow">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite" />
    </rect>
    <rect x="30" y="17" width="10" height="4" fill="#57F287" class="glow">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite" />
    </rect>

    <!-- Mouth -->
    <line x1="16" y1="32" x2="32" y2="32" stroke="#00C896" stroke-width="2.5" />
  </g>

  <!-- Decorative text inside card -->
  <text x="20" y="145" class="decor-text">&lt;AI_WORKFLOW_ACTIVE&gt;</text>
  <text x="300" y="145" class="decor-text" text-anchor="end">AZURE_INTEGRATED</text>

  <!-- Card Title -->
  <text x="160" y="105" class="title">CIVICMIND AI</text>
</svg>
