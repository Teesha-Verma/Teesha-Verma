<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="300" height="220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        fill: #8BE9FD;
        font-weight: bold;
      }
      .desc {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #C5C9DB;
      }
      .tags {
        font-family: 'Share Tech Mono', monospace;
        font-size: 10px;
        fill: #50FA7B;
      }
      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #8BE9FD;
        stroke-opacity: 0.3;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      svg:hover .card-bg {
        stroke-opacity: 1;
        stroke: #8BE9FD;
        filter: url(#glow);
      }
    </style>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect class="card-bg" width="300" height="220" rx="8" />

  <!-- Top bar (Icon + Title) -->
  <g transform="translate(15, 15)">
    <!-- Columns Icon -->
    <path d="M 0 13 h 16 M 2 13 v -8 h 3 v 8 M 6 13 v -10 h 3 v 10 M 11 13 v -7 h 3 v 7" fill="none" stroke="#8BE9FD" stroke-width="1.5" />
    <text class="title" x="24" y="11">CivicMind AI</text>
  </g>

  <!-- Illustration (Robot Head + Node Cloud) -->
  <g transform="translate(100, 42)">
    <!-- Connections -->
    <line x1="-30" y1="18" x2="10" y2="18" stroke="#1A253C" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="90" y1="18" x2="50" y2="18" stroke="#1A253C" stroke-width="1.5" stroke-dasharray="3,3" />
    <circle cx="-30" cy="18" r="3" fill="#8BE9FD" />
    <circle cx="130" cy="18" r="3" fill="#8BE9FD" />
    
    <!-- Robot Head -->
    <g transform="translate(10, 0)">
      <rect x="-4" y="10" width="4" height="8" rx="1" fill="#6272A4" />
      <rect x="40" y="10" width="4" height="8" rx="1" fill="#6272A4" />
      <rect x="0" y="2" width="40" height="24" rx="4" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.5" />
      <!-- Dark screen -->
      <rect x="4" y="6" width="32" height="10" fill="#0A0F24" rx="2" />
      <!-- Eyes -->
      <rect x="8" y="10" width="6" height="2" fill="#50FA7B" />
      <rect x="26" y="10" width="6" height="2" fill="#50FA7B" />
      <!-- Mouth -->
      <line x1="14" y1="20" x2="26" y2="20" stroke="#8BE9FD" stroke-width="1.5" />
      <!-- Antenna -->
      <line x1="20" y1="2" x2="20" y2="-4" stroke="#8BE9FD" stroke-width="1.5" />
      <circle cx="20" cy="-4" r="2.5" fill="#8BE9FD" />
    </g>
  </g>

  <!-- Description -->
  <g transform="translate(15, 115)">
    <text class="desc" x="0" y="15">AI-powered citizen assistance platform</text>
    <text class="desc" x="0" y="31">integrating intelligent workflows and</text>
    <text class="desc" x="0" y="47">cloud-native architecture.</text>
  </g>

  <!-- Tags -->
  <g transform="translate(15, 185)">
    <circle cx="4" cy="7" r="3" fill="#50FA7B" />
    <text class="tags" x="12" y="10">AI • NLP • FastAPI • Azure • MongoDB</text>
  </g>
</svg>
