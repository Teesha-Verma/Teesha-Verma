<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .title-text {
        font-family: 'Press Start 2P', monospace;
        font-size: 11px;
        fill: #8BE9FD;
        font-weight: bold;
      }
      
      .stat-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #6272A4;
      }
      
      .stat-val {
        font-family: 'Share Tech Mono', monospace;
        font-size: 16px;
        fill: #FFFFFF;
        font-weight: bold;
      }

      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #1A253C;
        stroke-width: 1.5;
        transition: all 0.3s ease;
      }

      svg:hover .card-bg {
        stroke: #8BE9FD;
        filter: url(#card-glow);
      }
      
      .pulse-heart {
        animation: heart-beat 1.5s infinite;
        transform-origin: center;
      }
      
      @keyframes heart-beat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
    </style>
    
    <filter id="card-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Pixel Heart definitions -->
    <g id="pink-pixel-heart">
      <path d="M 1 0 h 1 v 1 h -1 Z M 3 0 h 1 v 1 h -1 Z M 0 1 h 5 v 2 h -5 Z M 1 3 h 3 v 1 h -3 Z M 2 4 h 1 v 1 h -1 Z" fill="#FF75A0" />
    </g>
    <g id="gray-pixel-heart">
      <path d="M 1 0 h 1 v 1 h -1 Z M 3 0 h 1 v 1 h -1 Z M 0 1 h 5 v 2 h -5 Z M 1 3 h 3 v 1 h -3 Z M 2 4 h 1 v 1 h -1 Z" fill="#2C3E50" opacity="0.6" />
    </g>
  </defs>

  <!-- Card Frame -->
  <rect class="card-bg" width="480" height="240" rx="8" />

  <!-- Grid overlay -->
  <path d="M 20 0 v 240 M 40 0 v 240 M 440 0 v 240 M 460 0 v 240" fill="none" stroke="#6272A4" stroke-width="0.5" opacity="0.03" />

  <!-- Title & Icon -->
  <g transform="translate(20, 20)">
    <!-- Stats Bar chart Icon -->
    <path d="M 0 12 h 3 v -8 h -3 Z M 5 12 h 3 v -12 h -3 Z M 10 12 h 3 v -5 h -3 Z" fill="#8BE9FD" transform="translate(0, 2)" />
    <text class="title-text" x="22" y="13">GITHUB STATS</text>
  </g>

  <!-- Left Stats details -->
  <g transform="translate(20, 58)">
    <!-- Total Stars -->
    <g transform="translate(0, 0)">
      <!-- Star Icon -->
      <polygon points="8,0 10,6 16,6 11,10 13,16 8,12 3,16 5,10 0,6 6,6" fill="#FFD166" />
      <text class="stat-label" x="24" y="8">Total Stars</text>
      <text class="stat-val" x="24" y="24">120+</text>
    </g>

    <!-- Commits -->
    <g transform="translate(0, 42)">
      <!-- Branch/Commit Icon -->
      <circle cx="4" cy="4" r="3" fill="none" stroke="#50FA7B" stroke-width="1.5" />
      <circle cx="12" cy="12" r="3" fill="none" stroke="#50FA7B" stroke-width="1.5" />
      <line x1="4" y1="7" x2="4" y2="12" stroke="#50FA7B" stroke-width="1.5" />
      <path d="M 4 12 Q 4 12 12 12" fill="none" stroke="#50FA7B" stroke-width="1.5" />
      <text class="stat-label" x="24" y="8">Commits</text>
      <text class="stat-val" x="24" y="24">1.2k+</text>
    </g>

    <!-- PRs -->
    <g transform="translate(0, 84)">
      <!-- Pull Request Icon -->
      <circle cx="4" cy="4" r="2.5" fill="none" stroke="#BD93F9" stroke-width="1.5" />
      <circle cx="12" cy="4" r="2.5" fill="none" stroke="#BD93F9" stroke-width="1.5" />
      <circle cx="8" cy="12" r="2.5" fill="none" stroke="#BD93F9" stroke-width="1.5" />
      <path d="M 4 6.5 v 3 Q 4 12 8 12 M 12 6.5 v 3 Q 12 12 8 12" fill="none" stroke="#BD93F9" stroke-width="1.5" />
      <text class="stat-label" x="24" y="8">PRs</text>
      <text class="stat-val" x="24" y="24">80+</text>
    </g>

    <!-- Repositories -->
    <g transform="translate(0, 126)">
      <!-- Database Icon -->
      <path d="M 0 2 C 0 0, 12 0, 12 2 v 2 C 12 6, 0 6, 0 4 Z M 0 5 v 2.5 C 0 9.5, 12 9.5, 12 7.5 v -2.5 M 0 9 v 2.5 C 0 13.5, 12 13.5, 12 11.5 v -2.5" fill="none" stroke="#FF75A0" stroke-width="1.5" />
      <text class="stat-label" x="24" y="8">Repositories</text>
      <text class="stat-val" x="24" y="24">30+</text>
    </g>
  </g>

  <!-- Right Donut & Mascot -->
  <g transform="translate(360, 105)">
    <!-- Base Gray Circle -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#10182D" stroke-width="8" />
    
    <!-- Pink Progress Circle (75%) -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#FF75A0" stroke-width="8" 
            stroke-dasharray="263.89" stroke-dashoffset="66" stroke-linecap="round" transform="rotate(-90)" />

    <!-- Blue Progress Accent (25%) -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#8BE9FD" stroke-width="8" 
            stroke-dasharray="263.89" stroke-dashoffset="197.9" stroke-linecap="round" transform="rotate(180)" />

    <!-- Cute Cinnamoroll head in the center -->
    <g transform="translate(0, -2)">
      <ellipse cx="0" cy="0" rx="14" ry="9" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
      <path d="M -9 -4 C -18 -4, -24 5, -18 9 C -14 10, -10 6, -7 1" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
      <path d="M 9 -4 C 18 -4, 24 5, 18 9 C 14 10, 10 6, 7 1" fill="#FFFFFF" stroke="#1A252C" stroke-width="1.2" />
      <ellipse cx="-4.5" cy="0.5" rx="1" ry="1.6" fill="#6BA4FF" />
      <ellipse cx="4.5" cy="0.5" rx="1" ry="1.6" fill="#6BA4FF" />
      <ellipse cx="-7.5" cy="2.2" rx="1.8" ry="0.9" fill="#FF80A0" opacity="0.6" />
      <ellipse cx="8.5" cy="2.2" rx="1.8" ry="0.9" fill="#FF80A0" opacity="0.6" />
      <path d="M -1 2.2 Q 0 3 1 2.2" fill="none" stroke="#1A252C" stroke-width="0.8" />
    </g>

    <!-- Hearts underneath Donut (y=65 relative to center (0,0)) -->
    <g transform="translate(-25, 60)">
      <use href="#pink-pixel-heart" x="0" y="0" class="pulse-heart" />
      <use href="#pink-pixel-heart" x="10" y="0" class="pulse-heart" style="animation-delay: 0.2s;" />
      <use href="#pink-pixel-heart" x="20" y="0" class="pulse-heart" style="animation-delay: 0.4s;" />
      <use href="#gray-pixel-heart" x="30" y="0" />
      <use href="#gray-pixel-heart" x="40" y="0" />
    </g>
  </g>
</svg>
