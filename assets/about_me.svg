<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .title-text {
        font-family: 'Press Start 2P', monospace;
        font-size: 11px;
        fill: #FF75A0;
        font-weight: bold;
      }
      
      .body-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13.5px;
        fill: #C5C9DB;
      }
      
      .highlight-text {
        fill: #50FA7B;
        font-weight: bold;
      }
      
      .goal-text {
        fill: #FFB86C;
        font-weight: bold;
      }

      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #1A253C;
        stroke-width: 1.5;
        transition: all 0.3s ease;
      }

      svg:hover .card-bg {
        stroke: #FF75A0;
        filter: url(#card-glow);
      }
    </style>
    
    <filter id="card-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect class="card-bg" width="480" height="240" rx="8" />

  <!-- Grid overlay -->
  <path d="M 20 0 v 240 M 40 0 v 240 M 440 0 v 240 M 460 0 v 240" fill="none" stroke="#6272A4" stroke-width="0.5" opacity="0.03" />

  <!-- Title & Icon -->
  <g transform="translate(20, 20)">
    <!-- Pink User Icon -->
    <path d="M 6 2 A 4 4 0 1 0 6 10 A 4 4 0 1 0 6 2 Z M 0 14 C 0 11.3 2.7 10 6 10 C 9.3 10 12 11.3 12 14 Z" fill="#FF75A0" transform="translate(0, 2)" />
    <text class="title-text" x="22" y="13">ABOUT ME</text>
  </g>

  <!-- Paragraph Text -->
  <g transform="translate(20, 58)">
    <text class="body-text" x="0" y="15">Hello! I'm a final year Computer Science student passionate</text>
    <text class="body-text" x="0" y="33">about data engineering, cloud technologies, and building</text>
    <text class="body-text" x="0" y="51">intelligent systems that solve real-world problems.</text>
  </g>

  <!-- Bullet Points -->
  <g transform="translate(20, 130)">
    <!-- Bullet 1 -->
    <g transform="translate(0, 0)">
      <!-- Leaf emoji representation or icon -->
      <path d="M 0 6 C 2 2, 7 0, 10 3 C 8 8, 4 9, 0 6 Z" fill="#50FA7B" />
      <path d="M 10 3 C 8 2, 4 4, 3 8 C 6 8, 9 5, 10 3 Z" fill="#50FA7B" opacity="0.8" />
      <line x1="0" y1="9" x2="3" y2="6" stroke="#4E8C2B" stroke-width="1" />
      <text class="body-text" x="18" y="8"><tspan class="highlight-text">Currently learning:</tspan> Apache Spark, Delta Lake, Azure, AWS</text>
    </g>
    
    <!-- Bullet 2 -->
    <g transform="translate(0, 24)">
      <!-- Laptop Icon -->
      <rect x="0" y="1" width="12" height="7" rx="1" fill="#8BE9FD" />
      <line x1="-2" y1="9" x2="14" y2="9" stroke="#8BE9FD" stroke-width="1.5" />
      <text class="body-text" x="18" y="8"><tspan fill="#8BE9FD" font-weight="bold">Tech explorer</tspan> &amp; lifelong learner</text>
    </g>

    <!-- Bullet 3 -->
    <g transform="translate(0, 48)">
      <!-- Lightning bolt -->
      <polygon points="6,0 0,6 4,6 2,11 8,5 4,5" fill="#FFB86C" />
      <text class="body-text" x="18" y="8">Love building end-to-end solutions</text>
    </g>

    <!-- Bullet 4 -->
    <g transform="translate(0, 72)">
      <!-- Target/Bullseye -->
      <circle cx="6" cy="6" r="6" fill="#FF5E7E" />
      <circle cx="6" cy="6" r="4" fill="#FFFFFF" />
      <circle cx="6" cy="6" r="2" fill="#FF5E7E" />
      <text class="body-text" x="18" y="8"><tspan class="goal-text">Goal:</tspan> To become a Cloud-Native Data Engineer</text>
    </g>
  </g>
</svg>
