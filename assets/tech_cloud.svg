<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" width="140" height="90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #6272A4;
        text-anchor: middle;
      }
      .tech-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #C5C9DB;
        text-anchor: middle;
      }
      .card-bg {
        fill: #050814;
        fill-opacity: 0.9;
        stroke: #1A253C;
        stroke-width: 1.2;
        transition: all 0.3s ease;
      }
      svg:hover .card-bg {
        stroke: #8BE9FD;
        filter: url(#glow);
      }
    </style>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect class="card-bg" width="140" height="90" rx="6" />

  <!-- Title -->
  <text class="title" x="70" y="18">☁️ Cloud</text>

  <!-- Azure -->
  <g transform="translate(15, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- Azure Logo -->
    <polygon points="18,6 27,22 18,25 9,22" fill="#0089D6" transform="translate(0, 0) scale(1)" />
    <polygon points="18,6 9,22 18,22" fill="#0072C6" />
    <polygon points="18,6 27,22 18,22" fill="#50E6FF" opacity="0.5" />
    <text class="tech-label" x="18" y="47">Azure</text>
  </g>

  <!-- AWS -->
  <g transform="translate(89, 28)">
    <rect width="36" height="36" rx="4" fill="#0C101F" stroke="#1A253C" stroke-width="1" />
    <!-- AWS Arrow logo -->
    <g transform="translate(8, 10)">
      <text x="10" y="8" font-family="sans-serif" font-weight="bold" font-size="8" fill="#FFFFFF" text-anchor="middle">aws</text>
      <path d="M 1 12 q 9 4 18 0" fill="none" stroke="#FF9900" stroke-width="1.5" />
      <polygon points="19,12 17,9 15,11" fill="#FF9900" />
    </g>
    <text class="tech-label" x="18" y="47">AWS</text>
  </g>
</svg>